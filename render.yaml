envVarGroups:
  - name: student-tasks-config
    envVars:
      - key: MONGO_URI
      - key: JWT_SECRET
      - key: EMAIL_USER
      - key: EMAIL_PASS
      - key: VAPID_PUBLIC_KEY
      - key: VAPID_PRIVATE_KEY

services:
  # Backend (Express Server)
  - type: web
    name: student-tasks-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - fromGroup: student-tasks-config

  # Frontend (React PWA)
  - type: web
    name: student-tasks-app
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: student-tasks-api
          property: host
